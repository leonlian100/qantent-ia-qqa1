新增訊息<!DOCTYPE html><html>

<head>

<meta charset="UTF-8">

<title>Chat Memory</title>

<style>

body { font-family: Arial; padding: 20px; }

textarea { width: 100%; height: 100px; margin-bottom: 10px; }

button { margin: 5px; padding: 8px 12px; }

#history { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll;}

</style>

</head><body><h2>Chat Memory (Offline)</h2><textarea id="input" placeholder="輸入訊息..."></textarea><br><button onclick="addMessage()">新增訊息</button>

<button onclick="saveData()">💾 儲存</button>

<button onclick="clearData()">🗑 清空</button>

<h3>歷史紀錄</h3>

<div id="history"></div><script>

let messages = JSON.parse(localStorage.getItem("chat_memory") || "[]");

function render() {

  const history = document.getElementById("history");

  history.innerHTML = messages.map((m,i)=> 

    (i+1) + ". " + m

  ).join("\n");

}

function addMessage() {

  const input = document.getElementById("input");

  if (!input.value) return;

  messages.push(input.value);

  input.value = "";

  render();

}

function saveData() {

  localStorage.setItem("chat_memory", JSON.stringify(messages));

  alert("已儲存！");

}

function clearData() {

  if(confirm("確定清空？")){

    messages = [];

    localStorage.removeItem("chat_memory");

    render();

  }

}

render();

</script></body>

</html>
💾 儲存
🗑 清空
